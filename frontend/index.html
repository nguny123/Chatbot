<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Markdown-ish styling for bot responses */
        .bot-msg ul { list-style-type: disc; margin-left: 20px; }
        .bot-msg ol { list-style-type: decimal; margin-left: 20px; }
        .bot-msg p { margin-bottom: 0.5rem; }
        .bot-msg pre { background: #f3f4f6; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-3xl bg-slate-800 rounded-xl shadow-2xl overflow-hidden flex flex-col h-[85vh] border border-slate-700">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-teal-500 p-4 text-white flex justify-between items-center shadow-md">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                </svg>
                <h1 class="font-bold text-lg tracking-wide">Gemini AI</h1>
            </div>
            <span class="text-xs bg-white/20 px-2 py-1 rounded backdrop-blur-sm">gemini-2.5-flash</span>
        </div>

        <!-- Chat History -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-800 scroll-smooth">
            <!-- Welcome Message -->
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 rounded-full bg-teal-500 flex items-center justify-center text-white text-xs font-bold shrink-0">AI</div>
                <div class="bg-slate-700 text-slate-100 p-4 rounded-2xl rounded-tl-none max-w-[85%] text-sm leading-relaxed shadow-sm">
                    Hello! I'm powered by Google's Gemini model. Ask me anything!
                </div>
            </div>
        </div>

        <!-- Error Toast -->
        <div id="error-toast" class="hidden absolute top-20 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-full shadow-lg text-sm font-medium transition-all duration-300" role="alert">
            <span id="error-message">Connection Error</span>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-slate-800 border-t border-slate-700">
            <form id="chat-form" class="relative flex gap-3 max-w-full">
                <input 
                    type="text" 
                    id="user-input" 
                    class="w-full bg-slate-900 border border-slate-600 text-slate-100 rounded-xl px-5 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-all placeholder-slate-500"
                    placeholder="Type your message..."
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    id="send-btn"
                    class="absolute right-2 top-2 bottom-2 bg-teal-500 hover:bg-teal-600 text-white px-4 rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const errorToast = document.getElementById('error-toast');
        const errorMessage = document.getElementById('error-message');

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'flex items-end justify-end gap-3' : 'flex items-start gap-3';
            
            // Avatar
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0 ${role === 'user' ? 'bg-blue-600 order-2' : 'bg-teal-500'}`;
            avatar.innerText = role === 'user' ? 'ME' : 'AI';

            // Bubble
            const bubble = document.createElement('div');
            bubble.className = role === 'user' 
                ? 'bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] text-sm shadow-sm'
                : 'bg-slate-700 text-slate-100 p-3 rounded-2xl rounded-tl-none max-w-[85%] text-sm shadow-sm bot-msg leading-relaxed';
            
            bubble.textContent = text;
            
            div.appendChild(avatar);
            if (role === 'user') {
                div.appendChild(bubble); // Bubble first for flex-end alignment logic visuals
            } else {
                div.appendChild(bubble);
            }
            
            chatContainer.appendChild(div);
            scrollToBottom();
            return bubble;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorToast.classList.remove('hidden');
            setTimeout(() => errorToast.classList.add('hidden'), 4000);
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            const botBubble = appendMessage('bot', '');
            
            try {
                const response = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    if (response.status === 429) throw new Error("Too many requests. Slow down!");
                    throw new Error("Failed to connect to Gemini.");
                }

                // Stream handling
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    botBubble.textContent += chunk;
                    scrollToBottom();
                }

            } catch (err) {
                showError(err.message);
                botBubble.textContent = "Error: " + err.message;
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });
    </script>
</body>
</html>
